<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1620" viewBox="0 0 1080 1620">
    <!-- Frame background with 3 cutouts for 960x420 photos -->
    <path fill="#1A1A1A" fill-rule="evenodd" d="
        M0,0 h1080 v1620 h-1080 Z
        M60,60 h960 v420 h-960 Z
        M60,520 h960 v420 h-960 Z
        M60,980 h960 v420 h-960 Z
    "/>
    
    <!-- Thin white borders around photos -->
    <rect x="58" y="58" width="964" height="424" fill="none" stroke="#333333" stroke-width="4"/>
    <rect x="58" y="518" width="964" height="424" fill="none" stroke="#333333" stroke-width="4"/>
    <rect x="58" y="978" width="964" height="424" fill="none" stroke="#333333" stroke-width="4"/>
    
    <!-- Branding Text -->
    <text x="540" y="1510" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="6">SEBOOTH</text>
    <text x="540" y="1560" font-family="Arial, sans-serif" font-size="28" font-weight="normal" fill="#888888" text-anchor="middle" letter-spacing="3">NIGHT EDITION</text>
</svg>
